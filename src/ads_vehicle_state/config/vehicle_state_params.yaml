# Vehicle State Package Parameters
# Loaded by vehicle_state.launch.py and passed to each node.
# Override at launch: ros2 launch ads_vehicle_state vehicle_state.launch.py
# Override at runtime: ros2 param set /vehicle_state_publisher max_speed 20.0

vehicle_state_publisher:
  ros__parameters:
    # Publishing
    publish_rate: 20.0            # [Hz]
    state_topic: /vehicle/state
    command_topic: /vehicle/command
    frame_id: base_link

    # Safety
    command_timeout: 0.5          # [s]  Fail-safe decel if command goes stale

    # Sensor noise model (Gaussian)
    noise_stddev: 0.03            # [m/s]  Std-dev of speed measurement noise

    # Vehicle physical parameters (sedan approximation)
    wheelbase: 2.7                # [m]   Front-to-rear axle distance
    max_speed: 30.0               # [m/s] ~108 km/h hard ceiling
    max_accel: 3.0                # [m/s²] Maximum longitudinal acceleration
    max_decel: 6.0                # [m/s²] Maximum normal braking deceleration
    emergency_decel: 9.0          # [m/s²] Emergency stop deceleration (~0.9g)
    max_steering_angle: 0.5       # [rad]  ~28° — typical passenger car limit

vehicle_state_monitor:
  ros__parameters:
    topic_name: /vehicle/state
    log_interval: 2.0             # [s]  Interval between rolling-summary log lines

vehicle_commander:
  ros__parameters:
    command_topic: /vehicle/command
    publish_rate: 20.0            # [Hz]  Should match publisher rate
