<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS — 3D Ego Viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #111318; overflow: hidden; font-family: monospace; }
  canvas { display: block; }

  #hud {
    position: absolute; top: 10px; left: 10px;
    color: #d8e6ff; background: rgba(0,0,0,0.55);
    padding: 10px 14px; border-radius: 6px; font-size: 13px;
    line-height: 1.6; pointer-events: none;
  }
  #hud .big { font-size: 20px; font-weight: bold; }
  #hud .dim { color: #9aa8bf; }

  #connectBar {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 6px;
    color: #d8e6ff; font-size: 13px;
  }
  #connectBar input {
    background: #1b1f2a; border: 1px solid #3a4256; color: #d8e6ff;
    padding: 4px 8px; border-radius: 4px; width: 190px; font-family: monospace;
  }
  #connectBar button {
    background: #2d5fff; border: none; color: white; padding: 5px 12px;
    border-radius: 4px; margin-left: 6px; cursor: pointer; font-family: monospace;
  }
  #connectBar button:hover { background: #4471ff; }
  #status.ok  { color: #6cf28a; }
  #status.bad { color: #ff8a6c; }

  #viewToggleBtn {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.55); border: 1px solid #3a4256; color: #d8e6ff;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-family: monospace; font-size: 13px;
  }
  #viewToggleBtn:hover { background: rgba(45,95,255,0.35); }
</style>
</head>
<body>

<div id="hud">
  <div class="big" id="speed">-- km/h</div>
  <div class="dim" id="pos">x: --, y: --</div>
</div>

<div id="connectBar">
  ws://<input id="wsHost" value="192.168.64.5:8765">
  <button id="connectBtn">Connect</button>
  <div id="status" class="bad">disconnected</div>
</div>

<button id="viewToggleBtn">View: Follow (behind car)</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── Three.js scene ───────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111318);
// Scoped to a single route (a few dozen edges, at most a couple km) rather
// than the whole city, so fog/camera/ground can stay at a modest,
// single-vehicle scale instead of needing to cover ~9km x ~15km.
scene.fog = new THREE.Fog(0x111318, 200, 1500);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.5, 4000);
// Straight-down default (a tiny X epsilon avoids the gimbal singularity
// of sitting exactly on the up-axis) — OrbitControls treats this as its
// starting angle/distance, and the user can then drag to tilt away from
// it themselves (see the OrbitControls setup below).
camera.position.set(0.01, 300, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
// Supersample thin single-pixel route lines a bit — THREE.Line ignores
// linewidth on most platforms, and 1px lines shimmer/alias as the camera
// moves, especially over software-rendered GL in a VM.
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;   // stop just short of the horizon
// controls.target is moved to follow the car every frame (see animate()
// below), and that's the *only* thing driving the camera in "free" view
// mode — OrbitControls' own update() repositions the camera relative to
// that moving target using whatever angle/distance the user has
// interactively set via drag/scroll. (An earlier version manually
// recomputed camera.position from a fixed formula every frame instead,
// which silently fought and overrode any drag or zoom the user tried —
// OrbitControls already does exactly this job, so let it.) Pan stays
// disabled so the view can't drift off the car. Fully disabled (not just
// enableRotate=false) while in "follow" mode — see animate() — since that
// mode positions the camera directly and doesn't want OrbitControls
// fighting it or accumulating stray drag state in the meantime.
controls.enableRotate = true;
controls.enablePan = false;
controls.enableZoom = true;
controls.minDistance = 12;
controls.maxDistance = 400;

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(200, 400, 100);
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(4000, 4000),
  new THREE.MeshStandardMaterial({ color: 0x1a1e28 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const grid = new THREE.GridHelper(4000, 80, 0x2a3142, 0x22293a);
grid.position.y = 0.3;   // clear of the ground plane, still below the route line
scene.add(grid);

// SUMO (x, y) meters -> Three.js (x, 0, -y) so "up" in SUMO's top-down
// view maps to "further away" on screen instead of flipping the scene.
function toScene(x, y, z = 0) { return new THREE.Vector3(x, z, -y); }

// ── Lane-accurate road surface ──────────────────────────────────────────
// The ego's real TraCI position already sits at its true lateral position
// within its lane — this is purely about drawing real lane width/count so
// that correctly-positioned car doesn't look like it's drifting off a
// thin centerline on any road with more than one lane.

// Perpendicular offset of a polyline in the ground (XZ) plane, using each
// point's local direction of travel (averaged from its neighbors) as the
// tangent — used both to build each lane's road-surface ribbon and to
// mark its left/right edges.
function offsetPolyline(points, offset) {
  return points.map((p, i) => {
    const prev = points[Math.max(i - 1, 0)];
    const next = points[Math.min(i + 1, points.length - 1)];
    const dir = new THREE.Vector2(next.x - prev.x, next.z - prev.z).normalize();
    const normal = new THREE.Vector2(-dir.y, dir.x);
    return new THREE.Vector3(p.x + normal.x * offset, p.y, p.z + normal.y * offset);
  });
}

// Lane shapes come in junction-free (see sumo_bridge) — real junction
// footprints are drawn separately as their own patch (drawJunctions,
// below), which is what actually closes the visual gap at intersections
// now, geometrically correct regardless of how sharply a road turns there.
// This is just a small safety-margin overlap against any hairline sub-meter
// gap between an edge's exact endpoint and the junction polygon's boundary
// — not the primary gap-closing mechanism it used to be (that was a much
// larger 15m straight-line extrapolation, which only worked where a road
// kept going roughly straight through the intersection; at an actual turn,
// two straight extensions going in different directions just crossed each
// other in a wedge instead of aligning).
const LANE_EXTEND_M = 2;
// Marking lines (dashed dividers, solid outer edges, yellow center line)
// get their own, longer extension — the filled surface has to stay
// conservative here because a straight extrapolation is what caused the
// self-intersecting tangle at turns before real junction patches existed,
// but that risk doesn't apply to a thin line the same way (a line's
// occasional minor kink at a sharp corner is far less visible than the
// hole/pinch it caused on a filled surface). Without this, lines only
// poked ~2m into a junction that can easily be 15-20m across, leaving a
// visible gap in the painted lines even though the pavement itself (via
// the real junction patch) is already fully connected.
const LINE_EXTEND_M = 10;
function extendEnds(points, dist) {
  if (points.length < 2) return points;
  const startDir = new THREE.Vector2(
    points[1].x - points[0].x, points[1].z - points[0].z
  ).normalize();
  const endDir = new THREE.Vector2(
    points[points.length - 1].x - points[points.length - 2].x,
    points[points.length - 1].z - points[points.length - 2].z
  ).normalize();
  const startExt = new THREE.Vector3(
    points[0].x - startDir.x * dist, points[0].y, points[0].z - startDir.y * dist
  );
  const endExt = new THREE.Vector3(
    points[points.length - 1].x + endDir.x * dist,
    points[points.length - 1].y,
    points[points.length - 1].z + endDir.y * dist
  );
  return [startExt, ...points, endExt];
}

// Builds a road surface from a (possibly extended) centerline + width.
// Each segment between consecutive points gets its own independent quad
// from that segment's own local direction (so a single quad is always
// well-formed), and the small wedge at each interior joint between two
// differently-angled segments is filled with a connecting triangle fan —
// the standard "bevel join" technique for offsetting a polyline. This
// keeps the geometry itself robust even though the extension above is
// what actually closes the inter-edge gaps.
function buildLaneSurface(centerPts, width, linePts) {
  const half = width / 2;
  const positions = [];
  const segLeftA = [], segRightA = [], segLeftB = [], segRightB = [];

  for (let i = 0; i < centerPts.length - 1; i++) {
    const p0 = centerPts[i], p1 = centerPts[i + 1];
    const dir = new THREE.Vector2(p1.x - p0.x, p1.z - p0.z).normalize();
    const n = new THREE.Vector2(-dir.y, dir.x);
    const leftA  = new THREE.Vector3(p0.x + n.x * half, p0.y, p0.z + n.y * half);
    const rightA = new THREE.Vector3(p0.x - n.x * half, p0.y, p0.z - n.y * half);
    const leftB  = new THREE.Vector3(p1.x + n.x * half, p1.y, p1.z + n.y * half);
    const rightB = new THREE.Vector3(p1.x - n.x * half, p1.y, p1.z - n.y * half);
    segLeftA.push(leftA); segRightA.push(rightA);
    segLeftB.push(leftB); segRightB.push(rightB);

    positions.push(leftA.x, leftA.y, leftA.z, rightA.x, rightA.y, rightA.z, leftB.x, leftB.y, leftB.z);
    positions.push(rightA.x, rightA.y, rightA.z, rightB.x, rightB.y, rightB.z, leftB.x, leftB.y, leftB.z);
  }

  for (let i = 1; i < centerPts.length - 1; i++) {
    const c = centerPts[i];
    const pl = segLeftB[i - 1],  pr = segRightB[i - 1];
    const nl = segLeftA[i],      nr = segRightA[i];
    positions.push(c.x, c.y, c.z, pl.x, pl.y, pl.z, nl.x, nl.y, nl.z);
    positions.push(c.x, c.y, c.z, nr.x, nr.y, nr.z, pr.x, pr.y, pr.z);
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
  geom.computeVertexNormals();

  // Boundary-marking lines use the separately, more generously extended
  // linePts (see LINE_EXTEND_M) rather than the surface's own centerPts.
  const left = offsetPolyline(linePts, half);
  const right = offsetPolyline(linePts, -half);
  return { geom, left, right };
}

const laneSurfaceMat = new THREE.MeshStandardMaterial({ color: 0x33383f, side: THREE.DoubleSide });
// Dashed for dividers between lanes going the same way (you can cross
// them); solid for the road's outer edges; yellow for the center line
// between opposing directions — same convention as a real street.
const dividerMat  = new THREE.LineDashedMaterial({ color: 0xdfe8ff, dashSize: 2, gapSize: 1.5 });
const outerMat    = new THREE.LineBasicMaterial({ color: 0xdfe8ff });
const centerMat   = new THREE.LineBasicMaterial({ color: 0xe0c34a });

function markingLine(points, material) {
  const raised = points.map((p) => new THREE.Vector3(p.x, p.y + 0.02, p.z));
  const geom = new THREE.BufferGeometry().setFromPoints(raised);
  const line = new THREE.Line(geom, material);
  line.computeLineDistances();   // required for dashed materials to render dashed
  return line;
}

// Rough "are these two boundaries actually the same physical seam" check —
// compares the midpoint of each polyline rather than requiring identical
// sampling between the forward/reverse edges.
function boundaryDistance(a, b) {
  const pa = a[Math.floor(a.length / 2)];
  const pb = b[Math.floor(b.length / 2)];
  return pa.distanceTo(pb);
}

let laneGroup = null;
function drawLanes(edgeGroups) {
  if (laneGroup) scene.remove(laneGroup);
  laneGroup = new THREE.Group();

  // One "innermost boundary" candidate per edge group — the side closest
  // to oncoming traffic, and so the candidate for a shared yellow center
  // line once paired against the opposing direction's own innermost side.
  const innerCandidates = [];   // { points, direction }

  for (const group of edgeGroups) {
    const laneBoundaries = [];
    for (const lane of group.lanes) {
      const rawPts = lane.shape.map(([x, y]) => toScene(x, y, 0.5));
      if (rawPts.length < 2) continue;
      const centerPts = extendEnds(rawPts, LANE_EXTEND_M);
      const linePts = extendEnds(rawPts, LINE_EXTEND_M);
      const { geom, left, right } = buildLaneSurface(centerPts, lane.width, linePts);
      laneGroup.add(new THREE.Mesh(geom, laneSurfaceMat));
      laneBoundaries.push({ left, right });
    }
    if (laneBoundaries.length === 0) continue;

    // SUMO lane index 0 is the rightmost (outer/curb) lane, increasing
    // toward the innermost lane next to oncoming traffic — getLanes()
    // preserves that order, so index 0's "right" is the true outer edge
    // and the last lane's "left" is the innermost boundary.
    for (let i = 0; i < laneBoundaries.length - 1; i++) {
      laneGroup.add(markingLine(laneBoundaries[i].left, dividerMat));
    }
    laneGroup.add(markingLine(laneBoundaries[0].right, outerMat));
    innerCandidates.push({
      points: laneBoundaries[laneBoundaries.length - 1].left,
      direction: group.direction,
    });
  }

  // Pair up forward/reverse innermost boundaries that are actually close
  // together (the real center of a two-way street) and draw those yellow;
  // anything left over (a genuinely one-way street's innermost lane) just
  // keeps the default white outer-edge treatment.
  const forward = innerCandidates.filter((c) => c.direction === "forward");
  const reverse = innerCandidates.filter((c) => c.direction === "reverse");
  const paired = new Set();
  for (const f of forward) {
    let best = null, bestDist = Infinity;
    for (const r of reverse) {
      if (paired.has(r)) continue;
      const d = boundaryDistance(f.points, r.points);
      if (d < bestDist) { bestDist = d; best = r; }
    }
    if (best && bestDist < 6) {   // within about one lane width -> genuinely adjacent
      laneGroup.add(markingLine(f.points, centerMat));
      laneGroup.add(markingLine(best.points, centerMat));
      paired.add(f);
      paired.add(best);
    }
  }
  for (const c of innerCandidates) {
    if (!paired.has(c)) laneGroup.add(markingLine(c.points, outerMat));
  }

  scene.add(laneGroup);
}

// Real junction footprints (SUMO's own polygon for the paved intersection
// area) rendered as their own flat patch — same technique as the building
// roof cap below (ShapeGeometry/earcut handles the non-convex shapes real
// intersections have). Sits just below the lane surface height so lane
// polygons' small end-extension safely overlaps on top without the two
// coplanar surfaces z-fighting where they meet.
const JUNCTION_HEIGHT = 0.4;
function buildJunctionPatch(footprintPts) {
  const shape = new THREE.Shape(footprintPts.map((p) => new THREE.Vector2(p.x, -p.z)));
  const geom = new THREE.ShapeGeometry(shape);
  geom.rotateX(-Math.PI / 2);
  geom.translate(0, JUNCTION_HEIGHT, 0);
  return geom;
}

let junctionGroup = null;
function drawJunctions(junctions) {
  if (junctionGroup) scene.remove(junctionGroup);
  junctionGroup = new THREE.Group();
  for (const j of junctions) {
    const footprintPts = j.shape.map(([x, y]) => toScene(x, y, 0));
    if (footprintPts.length < 3) continue;
    junctionGroup.add(new THREE.Mesh(buildJunctionPatch(footprintPts), laneSurfaceMat));
  }
  scene.add(junctionGroup);
}

// ── Buildings ────────────────────────────────────────────────────────────
// Note: the camera is a strict top-down view (see CHASE_OFFSET below), so
// walls won't read as visible 3D volume from directly overhead — mostly
// the roof caps will show, as colored footprint shapes. Built correctly
// with real height regardless, so it holds up if the camera angle changes
// later.
const buildingMat = new THREE.MeshStandardMaterial({ color: 0x6b5f4f, side: THREE.DoubleSide });

// Simple deterministic "random" height per building from its footprint's
// first point, so buildings vary a bit (6-18m) without needing real
// height data — polyconvert's default output doesn't carry it.
function buildingHeight(shapePts) {
  const seed = Math.abs(Math.round(shapePts[0].x * 7 + shapePts[0].z * 13));
  return 6 + (seed % 12);
}

function buildBuildingWalls(footprintPts, height) {
  const positions = [];
  const n = footprintPts.length;
  for (let i = 0; i < n; i++) {
    const a = footprintPts[i];
    const b = footprintPts[(i + 1) % n];
    const a0 = new THREE.Vector3(a.x, 0, a.z);
    const a1 = new THREE.Vector3(a.x, height, a.z);
    const b0 = new THREE.Vector3(b.x, 0, b.z);
    const b1 = new THREE.Vector3(b.x, height, b.z);
    positions.push(a0.x, a0.y, a0.z, b0.x, b0.y, b0.z, a1.x, a1.y, a1.z);
    positions.push(b0.x, b0.y, b0.z, b1.x, b1.y, b1.z, a1.x, a1.y, a1.z);
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
  geom.computeVertexNormals();
  return geom;
}

// Roof cap via THREE.Shape/ShapeGeometry rather than manual fan
// triangulation — building footprints can be non-convex, and ShapeGeometry
// handles that correctly (earcut) where a naive fan from one interior
// point wouldn't. ShapeGeometry lies flat in the local XY plane; rotating
// -90° about X and translating maps it onto our XZ ground plane at the
// given height — the -p.z below pre-compensates that rotation's sign flip
// so the footprint doesn't end up mirrored.
function buildBuildingRoof(footprintPts, height) {
  const shape = new THREE.Shape(footprintPts.map((p) => new THREE.Vector2(p.x, -p.z)));
  const geom = new THREE.ShapeGeometry(shape);
  geom.rotateX(-Math.PI / 2);
  geom.translate(0, height, 0);
  return geom;
}

let buildingGroup = null;
function drawBuildings(buildings) {
  if (buildingGroup) scene.remove(buildingGroup);
  buildingGroup = new THREE.Group();
  for (const shape of buildings) {
    const footprintPts = shape.map(([x, y]) => toScene(x, y, 0));
    if (footprintPts.length < 3) continue;
    const height = buildingHeight(footprintPts);
    buildingGroup.add(new THREE.Mesh(buildBuildingWalls(footprintPts, height), buildingMat));
    buildingGroup.add(new THREE.Mesh(buildBuildingRoof(footprintPts, height), buildingMat));
  }
  scene.add(buildingGroup);
}

// Simple car proxy: body + cabin, nose along +X (rotated to match heading).
function makeCar(bodyColor, emissiveColor) {
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(4.2, 1.2, 1.9),
    new THREE.MeshStandardMaterial({ color: bodyColor, emissive: emissiveColor })
  );
  body.position.y = 0.7;
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(2.0, 0.9, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x1b2430 })
  );
  cabin.position.set(-0.3, 1.55, 0);
  group.add(body, cabin);
  return group;
}

const car = makeCar(0x35e0e0, 0x0a3a3a);
car.visible = false;
scene.add(car);

// Background traffic — one car mesh per vehicle id, added/removed/updated
// to track whichever ids are present in each "traffic" message (vehicles
// come and go as they finish their route).
const TRAFFIC_COLOR = 0xff8a3d, TRAFFIC_EMISSIVE = 0x4a2405;
const trafficCars = new Map();   // id -> THREE.Group

let egoSeen = false;
let egoHeading = 0;   // SUMO convention: 0 = east, CCW positive

// Two view modes, toggled by the button:
//  - "follow": fixed, close, heading-relative view from just behind the car
//    (like Waymo's in-rider-app view) — camera position is fully computed
//    here every frame, OrbitControls disabled entirely so it can't fight it.
//  - "free": camera translates to follow the car's position but does NOT
//    rotate with its heading (a turning car visibly changes screen-
//    direction; the camera holding a constant angle is what makes that
//    turn readable, rather than swinging to keep the car "facing away,"
//    which looks disorienting mid-turn) — rotate/zoom around that
//    translating point are entirely OrbitControls' job (drag/scroll).
let viewMode = "follow";
const FOLLOW_DISTANCE_M = 10;                          // behind the car
const FOLLOW_ELEVATION_RAD = THREE.MathUtils.degToRad(30);   // above horizon ("60 deg from straight up")

const viewToggleBtn = document.getElementById("viewToggleBtn");
viewToggleBtn.addEventListener("click", () => {
  viewMode = viewMode === "follow" ? "free" : "follow";
  controls.enabled = viewMode === "free";
  viewToggleBtn.textContent = viewMode === "follow"
    ? "View: Follow (behind car)"
    : "View: Free (drag to look around)";
});
controls.enabled = false;   // starts in "follow" mode

function animate() {
  requestAnimationFrame(animate);
  // Before the ego spawns, follow the scene origin (routes are recentered
  // near it) instead of the car, so the view already tracks correctly
  // while previewing a route, before the ego actually exists to follow.
  const followPoint = egoSeen ? car.position : new THREE.Vector3(0, 0, 0);

  if (viewMode === "follow") {
    const groundDist = FOLLOW_DISTANCE_M * Math.cos(FOLLOW_ELEVATION_RAD);
    const height = FOLLOW_DISTANCE_M * Math.sin(FOLLOW_ELEVATION_RAD);
    // Same forward/heading convention validated for the car model itself:
    // nose direction is (cos(heading), 0, -sin(heading)), so "behind" the
    // car is the negation of that.
    const behindX = -Math.cos(egoHeading) * groundDist;
    const behindZ =  Math.sin(egoHeading) * groundDist;
    camera.position.set(followPoint.x + behindX, followPoint.y + height, followPoint.z + behindZ);
    camera.lookAt(followPoint.x, followPoint.y + 1.2, followPoint.z);
  } else {
    controls.target.lerp(followPoint, 0.2);
    controls.update();
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── WebSocket ────────────────────────────────────────────────────────────
let ws = null;

function connect() {
  const host = document.getElementById("wsHost").value.trim();
  if (ws) ws.close();
  ws = new WebSocket("ws://" + host);
  const statusEl = document.getElementById("status");

  ws.onopen = () => { statusEl.textContent = "connected"; statusEl.className = "ok"; };
  ws.onclose = () => { statusEl.textContent = "disconnected"; statusEl.className = "bad"; };
  ws.onerror = () => { statusEl.textContent = "error"; statusEl.className = "bad"; };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "route") {
      // Not drawn — the wide lane surfaces from the "lanes" message are
      // the road itself; a separate thin route line on top is redundant.
      // A new route recenters the origin server-side, so the previous
      // ego/traffic positions are stale until fresh updates arrive.
      egoSeen = false;
      car.visible = false;
      for (const mesh of trafficCars.values()) scene.remove(mesh);
      trafficCars.clear();
    } else if (msg.type === "lanes") {
      drawLanes(msg.edges);
      drawJunctions(msg.junctions || []);
    } else if (msg.type === "buildings") {
      drawBuildings(msg.buildings);
    } else if (msg.type === "ego") {
      car.visible = true;
      egoSeen = true;
      car.position.copy(toScene(msg.x, msg.y, 0.5));   // sit on top of the lane surface
      // SUMO heading: 0 = east, CCW positive, nose along local +X. Working
      // through Three.js's Y-rotation matrix against toScene's z-negation
      // shows the *unnegated* heading is what lines the nose up with the
      // car's actual direction of travel — negating it (as this used to)
      // mirrors the nose direction for any heading off due east/west,
      // which reads as the car spinning the wrong way through a turn.
      car.rotation.y = msg.heading;
      egoHeading = msg.heading;
      document.getElementById("speed").textContent = (msg.speed * 3.6).toFixed(1) + " km/h";
      document.getElementById("pos").textContent = `x: ${msg.x.toFixed(1)}, y: ${msg.y.toFixed(1)}`;
    } else if (msg.type === "traffic") {
      const seen = new Set();
      for (const v of msg.vehicles) {
        seen.add(v.id);
        let mesh = trafficCars.get(v.id);
        if (!mesh) {
          mesh = makeCar(TRAFFIC_COLOR, TRAFFIC_EMISSIVE);
          trafficCars.set(v.id, mesh);
          scene.add(mesh);
        }
        mesh.position.copy(toScene(v.x, v.y, 0.5));
        mesh.rotation.y = v.heading;
      }
      // Drop cars for ids no longer present — that vehicle finished its
      // route and exited the network.
      for (const [id, mesh] of trafficCars) {
        if (!seen.has(id)) {
          scene.remove(mesh);
          trafficCars.delete(id);
        }
      }
    }
  };
}

document.getElementById("connectBtn").addEventListener("click", connect);
connect();
</script>
</body>
