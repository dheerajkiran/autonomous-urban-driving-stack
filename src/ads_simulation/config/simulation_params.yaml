# ads_simulation Package Parameters

sumo_bridge:
  ros__parameters:
    cache_dir: ~/ads_map_cache
    net_filename: tempe.net.xml
    cfg_filename: tempe.sumocfg         # Generated by map_loader (includes polygons)
    step_length: 0.02                   # SUMO simulation step [s] (50 steps/s)
    publish_rate: 50.0                  # ROS2 publish rate [Hz]
    detection_radius_m: 80.0            # Nearby vehicle detection radius [m]
    use_gui: false                      # sumo-gui not available on ARM64 — using custom Pygame viewer
    ego_depart_speed: 0.0               # Ego spawn speed [m/s] (overridden to speedLimit in code)
    target_vehicle_count: 0             # 0 = ego only; re-enable when testing traffic scenarios
    edge_search_radius_m: 50.0          # Max distance from an S/E pin to a candidate SUMO edge

mission_input:
  ros__parameters: {}                   # No parameters — all interaction is via terminal
