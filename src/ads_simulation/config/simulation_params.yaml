# ads_simulation Package Parameters

sumo_bridge:
  ros__parameters:
    cache_dir: ~/ads_map_cache
    net_filename: tempe.net.xml
    cfg_filename: tempe.sumocfg         # Generated by map_loader (includes polygons)
    step_length: 0.02                   # SUMO simulation step [s] (50 steps/s)
    publish_rate: 50.0                  # ROS2 publish rate [Hz]
    use_gui: false                      # sumo-gui not available on ARM64 — using custom Pygame viewer
    edge_search_radius_m: 150.0         # Max distance from an S/E pin to a candidate SUMO edge
                                         # (generous — map clicks rarely land exactly on-road)
    building_search_pad_deg: 0.0006     # ~60m padding around the route when fetching nearby
                                         # buildings from Overpass, for the 3D viewer
    background_traffic_count: 4         # Vehicles spawned on the route's reverse-direction
                                         # edges each time the ego spawns, for the 3D viewer
