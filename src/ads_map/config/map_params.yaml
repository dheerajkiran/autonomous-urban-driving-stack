# ads_map Package Parameters

map_loader:
  ros__parameters:
    cache_dir: ~/ads_map_cache          # Where OSM and SUMO files are cached
    city_query: "Tempe, Arizona, USA"   # osmnx place query — covers all of Tempe
    network_type: drive                 # Only drivable roads (no footpaths, bikes)
    force_reload: false                 # Set true to re-download even if cache exists

route_planner:
  ros__parameters:
    cache_dir: ~/ads_map_cache
    graphml_filename: tempe_drive.graphml
    default_speed_kph: 50.0             # Assumed speed where OSM has no maxspeed tag
    waypoint_spacing_m: 30.0            # Target spacing between route waypoints [m]
